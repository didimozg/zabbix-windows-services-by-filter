name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check --quiet pyyaml

      - name: Validate JSON, YAML, and XML files
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import sys
          import xml.etree.ElementTree as ET
          import yaml

          exts = {".json", ".yaml", ".yml", ".xml"}
          errors = []

          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              if ".git" in path.parts:
                  continue
              if path.suffix.lower() not in exts:
                  continue

              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError as exc:
                  errors.append(f"{path}: not valid UTF-8 ({exc})")
                  continue

              try:
                  if path.suffix.lower() == ".json":
                      json.loads(text)
                  elif path.suffix.lower() in {".yaml", ".yml"}:
                      yaml.safe_load(text)
                  elif path.suffix.lower() == ".xml":
                      ET.fromstring(text)
              except Exception as exc:
                  errors.append(f"{path}: {exc}")

          if errors:
              print("Structured file validation failed:")
              for error in errors:
                  print(f"- {error}")
              sys.exit(1)

          print("Structured file validation passed.")
          PY

      - name: Validate shell scripts
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(**/*.sh)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi

          for file in "${files[@]}"; do
            echo "Checking $file"
            bash -n "$file"
          done

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -File | Where-Object {
            $_.Extension -in @('.ps1', '.psm1', '.psd1') -and $_.FullName -notmatch '[\\/]\.git[\\/]'
          }

          if (-not $files) {
            Write-Host 'No PowerShell scripts found.'
            exit 0
          }

          $hasErrors = $false

          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref] $tokens,
              [ref] $errors
            )

            if ($errors.Count -gt 0) {
              $hasErrors = $true
              Write-Host "Syntax errors in $($file.FullName):"
              $errors | ForEach-Object { Write-Host "  - $($_.Message)" }
            }
          }

          if ($hasErrors) {
            exit 1
          }

          Write-Host 'PowerShell syntax validation passed.'
